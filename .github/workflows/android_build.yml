name: Build Kotlin StealthHotspot

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17' # متوافق مع خيارات jvmTarget = "17" في ملفك
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew # خطوة ضرورية لتجنب خطأ Permission Denied

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: StealthHotspot-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
